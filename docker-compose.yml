services:
  db:
    image: postgres:15
    container_name: Voice_AI_postgres
    restart: always
    environment:
      POSTGRES_DB: Voice_AI_db
      POSTGRES_USER: Voice_AI_user
      POSTGRES_PASSWORD: Voice_AI_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: Voice_AI_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:
