services:
  db:
    image: postgres:15
    container_name: Voice_AI_postgres
    restart: always
    environment:
      POSTGRES_DB: Voice_AI_db
      POSTGRES_USER: Voice_AI_user
      POSTGRES_PASSWORD: Voice_AI_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: Voice_AI_redis
    restart: always
    ports:
      - "6380:6379"

  web:
    build: .
    container_name: Voice_AI_web
    restart: always
    volumes:
      - .:/app
      - recordings_data:/app/recordings
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
  recordings_data:
